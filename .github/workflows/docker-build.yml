name: Build and Push Docker Images

on:
  push:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "Dockerfile.ocaml"

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      base: ${{ steps.filter.outputs.base }}
      ocaml: ${{ steps.filter.outputs.ocaml }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            base:
              - 'Dockerfile'
            ocaml:
              - 'Dockerfile.ocaml'

  build-base:
    needs: check-changes
    if: needs.check-changes.outputs.base == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push compiler-tester
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/zju-cp/compiler-tester:latest

  build-ocaml:
    needs: [check-changes, build-base]
    if: |
      always() &&
      (needs.check-changes.outputs.base == 'true' || needs.check-changes.outputs.ocaml == 'true') &&
      (needs.build-base.result == 'success' || needs.build-base.result == 'skipped')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push compiler-tester-ocaml
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ocaml
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/zju-cp/compiler-tester-ocaml:latest
